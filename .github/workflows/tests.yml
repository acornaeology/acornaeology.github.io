name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

# Cancel in-flight runs on the same ref when a new commit lands. Saves
# CI minutes during rebases / force-pushes; doesn't affect master,
# where we want every commit's run to complete.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --group test

      - name: Run tests
        run: uv run pytest
